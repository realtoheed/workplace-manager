name: Build Windows

on:
  push:
    branches: [main, master]
    paths:
      - 'infovibe/desktop/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Enable Git symlinks (Windows)
        run: git config --global core.symlinks true

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fix symlinks for Windows
        shell: pwsh
        run: |
          git config core.symlinks true
          git checkout -f HEAD

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: infovibe/desktop
        run: flutter pub get

      - name: Pre-extract libwebrtc and patch CMakeLists.txt
        working-directory: infovibe/desktop
        shell: pwsh
        run: |
          $webrtcSymlink = "windows\flutter\ephemeral\.plugin_symlinks\flutter_webrtc"
          if (Test-Path $webrtcSymlink) {
            $target = (Get-Item $webrtcSymlink).Target
            if (-not $target) { Write-Host "Not a symlink, using direct path"; $target = $webrtcSymlink }
            Write-Host "flutter_webrtc real path: $target"
            
            $dlDir = "$target\third_party\downloads"
            $zipPath = "$dlDir\libwebrtc.zip"
            
            if (-not (Test-Path $zipPath)) {
              $zipUrl = "https://github.com/flutter-webrtc/flutter-webrtc/releases/download/v1.4.0/libwebrtc.zip"
              Write-Host "Downloading $zipUrl ..."
              New-Item -ItemType Directory -Path $dlDir -Force | Out-Null
              Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath -UseBasicParsing
            }
            
            $extractDir = "$dlDir\libwebrtc"
            if (-not (Test-Path $extractDir)) {
              Write-Host "Extracting libwebrtc.zip ..."
              Expand-Archive -Path $zipPath -DestinationPath $dlDir -Force
              Write-Host "Extracted to $dlDir"
            }
            
            $cmakeFile = "$target\third_party\CMakeLists.txt"
            if (Test-Path $cmakeFile) {
              $content = Get-Content $cmakeFile -Raw
              if ($content -match 'file\(ARCHIVE_EXTRACT') {
                $oldCmd = 'file(ARCHIVE_EXTRACT INPUT ${downloads_dir}/libwebrtc.zip DESTINATION ${downloads_dir})'
                $guardIf = 'if(NOT EXISTS ${downloads_dir}/libwebrtc/)'
                $newCmd = "  " + $oldCmd
                $guardEndif = 'endif()'
                $replacement = $guardIf + "`n" + $newCmd + "`n" + $guardEndif
                $patched = $content -replace [regex]::Escape($oldCmd), $replacement
                Set-Content -Path $cmakeFile -Value $patched -Encoding UTF8
                Write-Host "Patched CMakeLists.txt with extraction guard"
              } else {
                Write-Host "ARCHIVE_EXTRACT not found in CMakeLists.txt"
              }
            } else {
              Write-Host "CMakeLists.txt not found at $cmakeFile"
            }
          }

      - name: Extract version
        working-directory: infovibe/desktop
        id: version
        shell: pwsh
        run: |
          $content = Get-Content -Path "lib/main.dart" -Raw
          if ($content -match "kAppVersion\s*=\s*'([\d.]+)'") {
            $ver = $Matches[1]
            echo "version=$ver" >> $env:GITHUB_OUTPUT
          } else {
            throw "Could not extract version from main.dart"
          }

      - name: Build Windows release
        working-directory: infovibe/desktop
        run: flutter build windows --release

      - name: Package portable ZIP
        working-directory: infovibe/desktop
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath "build/windows/x64/runner/Release/workplace-manager_${ver}_portable.zip"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        working-directory: infovibe/desktop
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          & $iscc "windows/installer/setup.iss" /dMyAppVersion=$ver

      - name: Rename installer
        working-directory: infovibe/desktop
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $outDir = "build/windows/x64/runner/Release"
          Move-Item "$outDir/workplace-manager-setup.exe" `
            "$outDir/workplace-manager_${ver}_setup.exe" -Force

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: workplace-manager-windows-portable
          path: infovibe/desktop/build/windows/x64/runner/Release/workplace-manager_*_portable.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: workplace-manager-windows-setup
          path: infovibe/desktop/build/windows/x64/runner/Release/workplace-manager_*_setup.exe

      - name: Upload to server
        working-directory: infovibe/desktop
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        shell: pwsh
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $exeName = "workplace-manager_${ver}_setup.exe"
          $zipName = "workplace-manager_${ver}_portable.zip"
          $exePath = "build/windows/x64/runner/Release/$exeName"
          $zipPath = "build/windows/x64/runner/Release/$zipName"

          $sshDir = "$env:USERPROFILE\.ssh"
          mkdir $sshDir -Force | Out-Null
          $keyPath = "$sshDir\id_ed25519"
          [System.IO.File]::WriteAllText($keyPath, $env:SSH_KEY)
          & icacls $keyPath /inheritance:r /grant "${env:USERNAME}:F"

          scp -o StrictHostKeyChecking=no -i $keyPath $exePath `
            "${SERVER_USER}@${SERVER_HOST}:/var/www/infovibex.com/downloads/windows/"
          scp -o StrictHostKeyChecking=no -i $keyPath $zipPath `
            "${SERVER_USER}@${SERVER_HOST}:/var/www/infovibex.com/downloads/windows/"

          $vjson = @{
            version = $ver
            build = 19
            releaseDate = "2026-06-19"
            downloads = @{
              linux = @{
                deb = "https://infovibex.com/downloads/linux/workplace-manager_${ver}_amd64.deb"
                tar = "https://infovibex.com/downloads/linux/workplace-manager_${ver}_portable.tar.gz"
              }
              windows = @{
                exe = "https://infovibex.com/downloads/windows/workplace-manager_${ver}_setup.exe"
                zip = "https://infovibex.com/downloads/windows/workplace-manager_${ver}_portable.zip"
              }
            }
            changelog = "Windows build v$ver"
          } | ConvertTo-Json -Compress
          $vjsonPath = "$env:TEMP\version.json"
          Set-Content -Path $vjsonPath -Value $vjson -Encoding UTF8
          scp -o StrictHostKeyChecking=no -i $keyPath $vjsonPath "${SERVER_USER}@${SERVER_HOST}:/var/www/infovibex.com/version.json"
