name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infovibe/desktop

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: infovibe/desktop

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Replace plugin symlinks with junctions
        shell: pwsh
        run: |
          $path = "windows\flutter\ephemeral\.plugin_symlinks\flutter_webrtc"
          $item = Get-Item $path -ErrorAction SilentlyContinue
          if ($item -and $item.LinkType) {
            $target = $item.Target
            $fullPath = $item.FullName
            Remove-Item $path -Force -Recurse
            cmd /c "mklink /J `"$fullPath`" `"$target`"" | Out-Null
            Write-Host "Replaced $($item.LinkType) with junction"
          }

      - name: Build Windows release
        run: flutter build windows --release

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: workplace-manager-windows
          path: infovibe/desktop/build/windows/x64/runner/Release

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [analyze-and-test, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: workplace-manager-windows
          path: windows-build

      - name: Create portable ZIP
        run: |
          cd windows-build
          zip -r "../workplace-manager-1.0.25.zip" ./*
          cd ..

      - name: Prepare deploy files
        run: |
          mkdir -p deploy-files

          echo "→ Generating version.json"
          python3 -c "import json, datetime; data = {'version': '1.0.25', 'build': 26, 'releaseDate': datetime.date.today().isoformat(), 'downloads': {'linux': {'deb': 'https://infovibex.com/downloads/linux/workplace-manager_1.0.25_amd64.deb'}, 'windows': {'zip': 'https://infovibex.com/downloads/workplace-manager-1.0.25.zip'}}, 'changelog': '- Fixed: Windows screen share — falls back to DesktopCapturer when OS picker fails (RDP/VM fix)\n- Fixed: Participant names now show display name instead of UUID\n- Fixed: Mic toggle reliability improved with extended polling\n- Bumped version to 1.0.25'}; json.dump(data, open('deploy-files/version.json', 'w'), indent=4)"

          echo "→ Moving ZIP to deploy-files"
          cp workplace-manager-1.0.25.zip deploy-files/

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          HOST: ${{ secrets.SERVER_HOST || '2.25.206.232' }}
          PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          SSH_USER: ${{ secrets.SERVER_USER || 'root' }}
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "DEPLOY_SSH_KEY secret not set — skipping deploy"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          echo "→ Testing SSH connection"
          ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -p "$PORT" "$SSH_USER"@"$HOST" "echo 'SSH OK'" 2>&1

          echo "→ Creating remote directories"
          ssh -o StrictHostKeyChecking=accept-new -p "$PORT" "$SSH_USER"@"$HOST" "mkdir -p /var/www/infovibex.com/downloads" 2>&1

          echo "→ Deploying Windows portable ZIP"
          scp -o StrictHostKeyChecking=accept-new -P "$PORT" deploy-files/workplace-manager-1.0.25.zip "$SSH_USER"@"$HOST":/var/www/infovibex.com/downloads/workplace-manager-1.0.25.zip 2>&1

          echo "→ Removing old Windows ZIP"
          ssh -o StrictHostKeyChecking=accept-new -p "$PORT" "$SSH_USER"@"$HOST" "rm -f /var/www/infovibex.com/downloads/workplace-manager-1.0.24.zip" 2>&1

          echo "→ Deploying version.json"
          scp -o StrictHostKeyChecking=accept-new -P "$PORT" deploy-files/version.json "$SSH_USER"@"$HOST":/var/www/infovibex.com/version.json 2>&1

          echo "→ Downloading current index.html from server"
          scp -o StrictHostKeyChecking=accept-new -P "$PORT" "$SSH_USER"@"$HOST":/var/www/infovibex.com/index.html deploy-files/index.html 2>&1

          echo "→ Patching index.html"
          sed -i 's/v1\.0\.24/v1.0.25/g; s/workplace-manager-1\.0\.24\.zip/workplace-manager-1.0.25.zip/g; s/workplace-manager_1\.0\.24_amd64\.deb/workplace-manager_1.0.25_amd64.deb/g' deploy-files/index.html

          python3 -c "import re; html = open('deploy-files/index.html').read(); html = re.sub(r'<div class=changelog>.*?</div>', '<div class=changelog>\n<h3>v1.0.25 Changelog</h3>\n<ul>\n<li>Fixed: Windows screen share — falls back to DesktopCapturer when OS picker fails (RDP/VM fix)</li>\n<li>Fixed: Participant names now show display name instead of UUID</li>\n<li>Fixed: Mic toggle reliability improved with extended polling</li>\n<li>Bumped version to 1.0.25</li>\n</ul>\n</div>', html, flags=re.DOTALL); open('deploy-files/index.html', 'w').write(html)"

          echo "→ Deploying updated index.html"
          scp -o StrictHostKeyChecking=accept-new -P "$PORT" deploy-files/index.html "$SSH_USER"@"$HOST":/var/www/infovibex.com/index.html 2>&1

          echo "→ Setting permissions"
          ssh -o StrictHostKeyChecking=accept-new -p "$PORT" "$SSH_USER"@"$HOST" "chown -R www-data:www-data /var/www/infovibex.com/downloads /var/www/infovibex.com/version.json /var/www/infovibex.com/index.html" 2>&1

          echo "✓ Deploy complete"
