name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infovibe/desktop

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: infovibe/desktop

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Replace plugin symlinks with junctions
        shell: pwsh
        run: |
          $path = "windows\flutter\ephemeral\.plugin_symlinks\flutter_webrtc"
          $item = Get-Item $path -ErrorAction SilentlyContinue
          if ($item -and $item.LinkType) {
            $target = $item.Target
            $fullPath = $item.FullName
            Remove-Item $path -Force -Recurse
            cmd /c "mklink /J `"$fullPath`" `"$target`"" | Out-Null
            Write-Host "Replaced $($item.LinkType) with junction"
          }

      - name: Build Windows release
        run: flutter build windows --release

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: workplace-manager-windows
          path: infovibe/desktop/build/windows/x64/runner/Release
