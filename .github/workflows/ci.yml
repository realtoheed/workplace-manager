name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infovibe/desktop

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: infovibe/desktop

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Replace plugin symlinks with junctions
        shell: pwsh
        run: |
          $path = "windows\flutter\ephemeral\.plugin_symlinks\flutter_webrtc"
          $item = Get-Item $path -ErrorAction SilentlyContinue
          if ($item -and $item.LinkType) {
            $target = $item.Target
            $fullPath = $item.FullName
            Remove-Item $path -Force -Recurse
            cmd /c "mklink /J `"$fullPath`" `"$target`"" | Out-Null
            Write-Host "Replaced $($item.LinkType) with junction"
          }

      - name: Build Windows release
        run: flutter build windows --release

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: workplace-manager-windows
          path: infovibe/desktop/build/windows/x64/runner/Release

      - name: Create MSIX package
        shell: pwsh
        working-directory: infovibe/desktop
        run: |
          dart run msix:create

      - name: Copy MSIX to cert directory
        shell: pwsh
        working-directory: infovibe/desktop
        run: |
          New-Item -ItemType Directory -Force -Path build\windows\msix
          Copy-Item "build\windows\x64\runner\Release\workplace_manager.msix" "build\windows\msix\workplace_manager.msix"
          if (Test-Path "build\windows\x64\runner\Release\*.pfx") {
            Copy-Item "build\windows\x64\runner\Release\*.pfx" "build\windows\msix\"
          }

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: workplace-manager-msix
          path: infovibe/desktop/build/windows/msix/workplace_manager.msix

      - name: Upload MSIX certificate
        uses: actions/upload-artifact@v4
        with:
          name: workplace-manager-cert
          path: infovibe/desktop/build/windows/msix/*.pfx
          if-no-files-found: warn

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [analyze-and-test, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download MSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: workplace-manager-msix
          path: downloads

      - name: Deploy
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST || '2.25.206.232' }}
          PORT: ${{ secrets.DEPLOY_PORT || '2222' }}
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "DEPLOY_SSH_KEY secret not set — skipping deploy"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$PORT" "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          echo "→ Creating remote directories"
          ssh -p "$PORT" root@"$HOST" "mkdir -p /var/www/infovibex.com/downloads"

          echo "→ Deploying MSIX"
          scp -P "$PORT" downloads/workplace_manager.msix root@"$HOST":/var/www/infovibex.com/downloads/workplace-manager-1.0.24.msix

          echo "→ Deploying version.json"
          scp -P "$PORT" deploy/version.json root@"$HOST":/var/www/infovibex.com/version.json

          echo "→ Deploying index.html"
          scp -P "$PORT" deploy/index.html root@"$HOST":/var/www/infovibex.com/index.html

          echo "→ Setting permissions"
          ssh -p "$PORT" root@"$HOST" "chown -R www-data:www-data /var/www/infovibex.com/downloads /var/www/infovibex.com/version.json /var/www/infovibex.com/index.html"

          echo "→ Cleaning up old Inno Setup installer"
          ssh -p "$PORT" root@"$HOST" "rm -f /var/www/infovibex.com/downloads/workplace-manager-setup.exe"

          echo "✓ Deploy complete"
