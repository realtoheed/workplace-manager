name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infovibe/desktop

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: infovibe/desktop

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Replace plugin symlinks with junctions
        shell: pwsh
        run: |
          $path = "windows\flutter\ephemeral\.plugin_symlinks\flutter_webrtc"
          $item = Get-Item $path -ErrorAction SilentlyContinue
          if ($item -and $item.LinkType) {
            $target = $item.Target
            $fullPath = $item.FullName
            Remove-Item $path -Force -Recurse
            cmd /c "mklink /J `"$fullPath`" `"$target`"" | Out-Null
            Write-Host "Replaced $($item.LinkType) with junction"
          }

      - name: Build Windows release
        run: flutter build windows --release

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: workplace-manager-windows
          path: infovibe/desktop/build/windows/x64/runner/Release

      - name: Create MSIX package
        shell: pwsh
        working-directory: infovibe/desktop
        run: |
          dart run msix:create

      - name: Copy MSIX to cert directory
        shell: pwsh
        working-directory: infovibe/desktop
        run: |
          New-Item -ItemType Directory -Force -Path build\windows\msix
          Copy-Item "build\windows\x64\runner\Release\workplace_manager.msix" "build\windows\msix\workplace_manager.msix"
          if (Test-Path "build\windows\x64\runner\Release\*.pfx") {
            Copy-Item "build\windows\x64\runner\Release\*.pfx" "build\windows\msix\"
          }

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: workplace-manager-msix
          path: infovibe/desktop/build/windows/msix/workplace_manager.msix

      - name: Upload MSIX certificate
        uses: actions/upload-artifact@v4
        with:
          name: workplace-manager-cert
          path: infovibe/desktop/build/windows/msix/*.pfx
          if-no-files-found: warn

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [analyze-and-test, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download MSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: workplace-manager-msix
          path: downloads

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || '2222' }} ${{ secrets.DEPLOY_HOST || '2.25.206.232' }} >> ~/.ssh/known_hosts

      - name: Create remote directories
        run: |
          ssh -p ${{ secrets.DEPLOY_PORT || '2222' }} root@${{ secrets.DEPLOY_HOST || '2.25.206.232' }} "mkdir -p /var/www/infovibex.com/downloads"

      - name: Deploy MSIX
        run: |
          scp -P ${{ secrets.DEPLOY_PORT || '2222' }} downloads/workplace_manager.msix root@${{ secrets.DEPLOY_HOST || '2.25.206.232' }}:/var/www/infovibex.com/downloads/workplace-manager-1.0.24.msix

      - name: Deploy version.json
        run: |
          scp -P ${{ secrets.DEPLOY_PORT || '2222' }} deploy/version.json root@${{ secrets.DEPLOY_HOST || '2.25.206.232' }}:/var/www/infovibex.com/version.json

      - name: Deploy index.html
        run: |
          scp -P ${{ secrets.DEPLOY_PORT || '2222' }} deploy/index.html root@${{ secrets.DEPLOY_HOST || '2.25.206.232' }}:/var/www/infovibex.com/index.html

      - name: Set permissions
        run: |
          ssh -p ${{ secrets.DEPLOY_PORT || '2222' }} root@${{ secrets.DEPLOY_HOST || '2.25.206.232' }} "chown -R www-data:www-data /var/www/infovibex.com/downloads /var/www/infovibex.com/version.json /var/www/infovibex.com/index.html"

      - name: Clean up old Windows installers
        run: |
          ssh -p ${{ secrets.DEPLOY_PORT || '2222' }} root@${{ secrets.DEPLOY_HOST || '2.25.206.232' }} "rm -f /var/www/infovibex.com/downloads/workplace-manager-setup.exe"
