name: workplace_manager
description: "Workplace Manager — Professional team collaboration platform"
publish_to: 'none'
version: 1.0.24+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  socket_io_client: ^3.0.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  window_manager: ^0.3.0
  intl: ^0.19.0
  livekit_client: ^2.1.0
  flutter_webrtc: 1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.17.0

msix_config:
  display_name: Workplace Manager
  publisher_display_name: Infovibex
  identity_name: infovibex.workplace-manager
  msix_version: 1.0.24.0
  logo_path: assets/icon/app_icon_source.png
  capabilities: internetClient, microphone, webcam, graphicsCapture
  install_experiences: restricted

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
  
# Flutter icon generation:
# To generate app icons, place a 1024x1024 image at assets/icon/app_icon_source.png
# and run: flutter pub global run image/image_generation
