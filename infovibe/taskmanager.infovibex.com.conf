server {
    server_name taskmanager.infovibex.com;

    location /api/meetings/ {
        # CORS headers for remote control API
        add_header 'Access-Control-Allow-Origin' 'https://meet.infovibex.com' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/taskmanager.infovibex.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/taskmanager.infovibex.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = taskmanager.infovibex.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name taskmanager.infovibex.com;
    return 404; # managed by Certbot
}
